<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffd6ec">
<title>Násobilka</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(160deg, #ffd6ec 0%, #d4b5ff 50%, #a5c8ff 100%);
    color: #2d1b4e;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .status {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    font-size: 0.95rem;
    color: #6b4d8a;
    letter-spacing: 0.05em;
    gap: 12px;
  }
  .status strong { color: #2d1b4e; }
  .status .info {
    display: flex;
    gap: 18px;
    flex: 1;
    justify-content: space-between;
  }
  .reset-btn {
    border: none;
    background: rgba(255, 255, 255, 0.6);
    color: #6b4d8a;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    font-size: 1.1rem;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.08s ease, background 0.2s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .reset-btn:active {
    transform: scale(0.92);
    background: rgba(255, 255, 255, 0.9);
  }
  .question {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(3rem, 18vw, 7rem);
    font-weight: 800;
    letter-spacing: 0.02em;
    color: #2d1b4e;
    text-shadow: 0 2px 12px rgba(255, 255, 255, 0.5);
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 12px;
    padding: 12px;
    height: 55vh;
    max-height: 55vh;
  }
  .answer {
    border: none;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.7);
    color: #2d1b4e;
    font-size: clamp(2rem, 9vw, 3.5rem);
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(168, 85, 247, 0.18);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .answer:nth-child(1) { background: linear-gradient(135deg, #ffb3d9, #ff8fc8); color: #fff; }
  .answer:nth-child(2) { background: linear-gradient(135deg, #c9a3ff, #a570ff); color: #fff; }
  .answer:nth-child(3) { background: linear-gradient(135deg, #8fb8ff, #5b8fff); color: #fff; }
  .answer:nth-child(4) { background: linear-gradient(135deg, #ff9ec7, #c478ff); color: #fff; }
  .answer:active { transform: scale(0.96); }
  .answer.correct {
    background: linear-gradient(135deg, #6ee7a3, #2ecc71) !important;
    color: #fff !important;
    animation: pop 0.3s ease;
  }
  .answer.wrong {
    background: linear-gradient(135deg, #ff8a8a, #e74c3c) !important;
    color: #fff !important;
    animation: shake 0.3s ease;
  }
  .answer:disabled { cursor: default; }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  .summary {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 18px;
    text-align: center;
  }
  .summary h1 {
    font-size: clamp(1.8rem, 7vw, 2.6rem);
    font-weight: 800;
    color: #2d1b4e;
  }
  .summary .points {
    font-size: clamp(4rem, 20vw, 7rem);
    font-weight: 800;
    background: linear-gradient(135deg, #ff8fc8, #a570ff, #5b8fff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .summary .stats {
    display: flex;
    gap: 32px;
    font-size: 1.1rem;
    color: #6b4d8a;
  }
  .summary .stats strong {
    display: block;
    font-size: 1.6rem;
    color: #2d1b4e;
    margin-top: 4px;
  }
  .play-again {
    margin-top: 20px;
    padding: 18px 48px;
    border: none;
    border-radius: 22px;
    background: linear-gradient(135deg, #ff8fc8, #a570ff);
    color: #fff;
    font-size: 1.3rem;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.08s ease;
    box-shadow: 0 6px 20px rgba(165, 112, 255, 0.4);
  }
  .play-again:active { transform: scale(0.96); }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div class="status" id="status">
    <button class="reset-btn" id="resetBtn" aria-label="Reset">↻</button>
    <div class="info">
      <span>Otázka <strong id="qNum">1</strong>/10</span>
      <span><strong id="correct">0</strong> ✓</span>
      <span><strong id="timer">0.0</strong> s</span>
    </div>
  </div>
  <div class="question" id="question">— × — </div>
  <div class="grid" id="grid"></div>

  <div class="summary hidden" id="summary">
    <h1>Hotovo!</h1>
    <div class="points" id="finalPoints">0</div>
    <div class="stats">
      <div>Správne<strong id="finalCorrect">0/10</strong></div>
      <div>Čas<strong id="finalTime">0.0 s</strong></div>
    </div>
    <button class="play-again" id="playAgain">Znova</button>
  </div>

<script>
  const TOTAL_QUESTIONS = 10;

  const qEl = document.getElementById('question');
  const gridEl = document.getElementById('grid');
  const statusEl = document.getElementById('status');
  const qNumEl = document.getElementById('qNum');
  const correctEl = document.getElementById('correct');
  const timerEl = document.getElementById('timer');
  const summaryEl = document.getElementById('summary');
  const finalPointsEl = document.getElementById('finalPoints');
  const finalCorrectEl = document.getElementById('finalCorrect');
  const finalTimeEl = document.getElementById('finalTime');
  const playAgainBtn = document.getElementById('playAgain');

  let questionIndex = 0;
  let correctCount = 0;
  let currentAnswer = 0;
  let locked = false;
  let startTime = 0;
  let timerInterval = null;

  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function generateOptions(answer) {
    const options = new Set([answer]);
    while (options.size < 4) {
      const delta = rand(1, 8) * (Math.random() < 0.5 ? -1 : 1);
      const candidate = answer + delta;
      if (candidate > 0 && candidate <= 100) options.add(candidate);
    }
    return Array.from(options).sort(() => Math.random() - 0.5);
  }

  function elapsedSeconds() {
    return (Date.now() - startTime) / 1000;
  }

  function updateTimer() {
    timerEl.textContent = elapsedSeconds().toFixed(1);
  }

  function nextQuestion() {
    if (questionIndex >= TOTAL_QUESTIONS) {
      finish();
      return;
    }
    questionIndex++;
    qNumEl.textContent = questionIndex;
    locked = false;

    const a = rand(1, 10);
    const b = rand(1, 10);
    currentAnswer = a * b;
    qEl.textContent = `${a} × ${b}`;

    const options = generateOptions(currentAnswer);
    gridEl.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'answer';
      btn.textContent = opt;
      btn.addEventListener('click', () => handleAnswer(btn, opt));
      gridEl.appendChild(btn);
    });
  }

  function handleAnswer(btn, value) {
    if (locked) return;
    locked = true;
    const buttons = gridEl.querySelectorAll('.answer');
    buttons.forEach(b => b.disabled = true);

    if (value === currentAnswer) {
      btn.classList.add('correct');
      correctCount++;
      correctEl.textContent = correctCount;
      setTimeout(nextQuestion, 500);
    } else {
      btn.classList.add('wrong');
      buttons.forEach(b => {
        if (parseInt(b.textContent, 10) === currentAnswer) {
          b.classList.add('correct');
        }
      });
      setTimeout(nextQuestion, 1100);
    }
  }

  function computeScore(correct, totalSeconds) {
    // Base: 100 points per correct answer.
    // Time bonus: scaled so a fast perfect run (~30s for 10) gets a strong bonus,
    // a slow run (>120s) gets none. Bonus only applies to correct answers.
    const base = correct * 100;
    const idealPerQ = 3;            // seconds per question for max bonus
    const cutoffPerQ = 12;          // seconds per question past which bonus is 0
    const avg = totalSeconds / TOTAL_QUESTIONS;
    let speedFactor = (cutoffPerQ - avg) / (cutoffPerQ - idealPerQ);
    speedFactor = Math.max(0, Math.min(1, speedFactor));
    const bonus = Math.round(correct * 10 * speedFactor);
    return base + bonus;
  }

  function finish() {
    clearInterval(timerInterval);
    const totalTime = elapsedSeconds();
    const points = computeScore(correctCount, totalTime);

    statusEl.classList.add('hidden');
    qEl.classList.add('hidden');
    gridEl.classList.add('hidden');

    finalPointsEl.textContent = points;
    finalCorrectEl.textContent = `${correctCount}/${TOTAL_QUESTIONS}`;
    finalTimeEl.textContent = `${totalTime.toFixed(1)} s`;
    summaryEl.classList.remove('hidden');
  }

  function start() {
    questionIndex = 0;
    correctCount = 0;
    correctEl.textContent = '0';
    qNumEl.textContent = '1';

    statusEl.classList.remove('hidden');
    qEl.classList.remove('hidden');
    gridEl.classList.remove('hidden');
    summaryEl.classList.add('hidden');

    startTime = Date.now();
    clearInterval(timerInterval);
    timerInterval = setInterval(updateTimer, 100);
    updateTimer();

    nextQuestion();
  }

  playAgainBtn.addEventListener('click', start);
  document.getElementById('resetBtn').addEventListener('click', start);
  start();
</script>
</body>
</html>
