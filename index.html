<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffd6ec">
<title>Násobilka</title>
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Násobilka">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(160deg, #ffd6ec 0%, #d4b5ff 50%, #a5c8ff 100%);
    color: #2d1b4e;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .status {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    font-size: 0.95rem;
    color: #6b4d8a;
    letter-spacing: 0.05em;
    gap: 12px;
  }
  .status strong { color: #2d1b4e; }
  .status .info {
    display: flex;
    gap: 18px;
    flex: 1;
    justify-content: space-between;
  }
  .reset-btn {
    border: none;
    background: rgba(255, 255, 255, 0.6);
    color: #6b4d8a;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    font-size: 1.5rem;
    line-height: 1;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.08s ease, background 0.2s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .reset-btn:active {
    transform: scale(0.92);
    background: rgba(255, 255, 255, 0.9);
  }
  .question {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(3rem, 18vw, 7rem);
    font-weight: 800;
    letter-spacing: 0.02em;
    color: #2d1b4e;
    text-shadow: 0 2px 12px rgba(255, 255, 255, 0.5);
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 12px;
    padding: 12px;
    height: 55vh;
    max-height: 55vh;
  }
  .answer {
    border: none;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.7);
    color: #2d1b4e;
    font-size: clamp(2rem, 9vw, 3.5rem);
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(168, 85, 247, 0.18);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .answer:nth-child(1) { background: linear-gradient(135deg, #ffb3d9, #ff8fc8); color: #fff; }
  .answer:nth-child(2) { background: linear-gradient(135deg, #c9a3ff, #a570ff); color: #fff; }
  .answer:nth-child(3) { background: linear-gradient(135deg, #8fb8ff, #5b8fff); color: #fff; }
  .answer:nth-child(4) { background: linear-gradient(135deg, #ff9ec7, #c478ff); color: #fff; }
  .answer:active { transform: scale(0.96); }
  .answer.correct {
    background: linear-gradient(135deg, #6ee7a3, #2ecc71) !important;
    color: #fff !important;
    animation: pop 0.3s ease;
  }
  .answer.wrong {
    background: linear-gradient(135deg, #ff8a8a, #e74c3c) !important;
    color: #fff !important;
    animation: shake 0.3s ease;
  }
  .answer:disabled { cursor: default; }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  .summary {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 28px 20px 24px;
    gap: 14px;
    text-align: center;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .summary h1 {
    font-size: clamp(1.8rem, 7vw, 2.4rem);
    font-weight: 800;
    color: #2d1b4e;
  }
  .summary .subtitle {
    color: #6b4d8a;
    font-size: 1rem;
    margin-top: -6px;
  }
  .summary .points {
    font-size: clamp(3rem, 14vw, 5rem);
    font-weight: 800;
    background: linear-gradient(135deg, #ff8fc8, #a570ff, #5b8fff);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .summary .stats {
    display: flex;
    gap: 32px;
    font-size: 1rem;
    color: #6b4d8a;
  }
  .summary .stats strong {
    display: block;
    font-size: 1.4rem;
    color: #2d1b4e;
    margin-top: 4px;
  }
  .play-again {
    margin-top: 8px;
    padding: 16px 44px;
    border: none;
    border-radius: 22px;
    background: linear-gradient(135deg, #ff8fc8, #a570ff);
    color: #fff;
    font-size: 1.2rem;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.08s ease;
    box-shadow: 0 6px 20px rgba(165, 112, 255, 0.4);
  }
  .play-again:active { transform: scale(0.96); }
  .link-btn {
    background: rgba(255, 255, 255, 0.55);
    border: none;
    color: #6b4d8a;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    padding: 12px 24px;
    border-radius: 14px;
    transition: transform 0.08s ease, background 0.2s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .link-btn:active {
    transform: scale(0.96);
    background: rgba(255, 255, 255, 0.85);
  }
  .save-row {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 340px;
    margin-top: 4px;
  }
  .name-input {
    flex: 1;
    min-width: 0;
    padding: 14px 16px;
    border: 2px solid rgba(255, 255, 255, 0.7);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.7);
    color: #2d1b4e;
    font-size: 1.05rem;
    font-family: inherit;
    font-weight: 600;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .name-input:focus {
    border-color: #a570ff;
    background: rgba(255, 255, 255, 0.95);
  }
  .save-btn {
    padding: 14px 22px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #ff8fc8, #a570ff);
    color: #fff;
    font-weight: 700;
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.08s ease, opacity 0.2s ease;
  }
  .save-btn:active { transform: scale(0.96); }
  .save-btn:disabled { opacity: 0.5; cursor: default; }
  .save-msg {
    font-size: 0.9rem;
    color: #d63384;
    min-height: 1.2em;
  }
  .leaderboard {
    width: 100%;
    max-width: 360px;
    margin-top: 4px;
  }
  .leaderboard h2 {
    font-size: 0.85rem;
    color: #6b4d8a;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .leaderboard ol {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .leaderboard li {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    background: rgba(255, 255, 255, 0.55);
    border-radius: 12px;
    margin-bottom: 5px;
    font-size: 1rem;
    color: #2d1b4e;
  }
  .leaderboard li.me {
    background: linear-gradient(135deg, #ff8fc8, #a570ff);
    color: #fff;
    font-weight: 700;
    box-shadow: 0 4px 14px rgba(165, 112, 255, 0.35);
  }
  .leaderboard .rank {
    width: 28px;
    text-align: left;
    font-weight: 700;
    opacity: 0.7;
  }
  .leaderboard li.me .rank { opacity: 1; }
  .leaderboard .name {
    flex: 1;
    text-align: left;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 8px;
  }
  .leaderboard .score {
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .leaderboard .empty {
    text-align: center;
    color: #6b4d8a;
    padding: 12px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div class="status" id="status">
    <button class="reset-btn" id="resetBtn" aria-label="Koniec">×</button>
    <div class="info">
      <span>Otázka <strong id="qNum">1</strong>/10</span>
      <span><strong id="correct">0</strong> ✓</span>
      <span><strong id="timer">0.0</strong> s</span>
    </div>
  </div>
  <div class="question" id="question">— × — </div>
  <div class="grid" id="grid"></div>

  <div class="summary" id="startScreen">
    <h1>Násobilka</h1>
    <div class="subtitle">10 otázok · 4 možnosti</div>
    <button class="play-again" id="startBtn">Štart</button>
    <button class="link-btn" id="openLeaderboardBtn">🏆 Rebríček</button>
  </div>

  <div class="summary hidden" id="leaderboardScreen">
    <h1>🏆 Rebríček</h1>
    <div class="leaderboard">
      <ol id="standaloneLeaderboardList"></ol>
    </div>
    <button class="play-again" id="backFromLeaderboardBtn">Späť</button>
  </div>

  <div class="summary hidden" id="summary">
    <h1>Hotovo!</h1>
    <div class="points" id="finalPoints">0</div>
    <div class="stats">
      <div>Správne<strong id="finalCorrect">0/10</strong></div>
      <div>Čas<strong id="finalTime">0.0 s</strong></div>
    </div>
    <div class="save-row" id="saveRow">
      <input type="text" class="name-input" id="nameInput" placeholder="Tvoje meno" maxlength="20" autocomplete="off" autocapitalize="words">
      <button class="save-btn" id="saveBtn">Uložiť</button>
    </div>
    <div class="save-msg" id="saveMsg"></div>
    <div class="leaderboard hidden" id="leaderboard">
      <h2>Top 10</h2>
      <ol id="leaderboardList"></ol>
    </div>
    <button class="play-again" id="playAgain">Znova</button>
  </div>

<script>
  const TOTAL_QUESTIONS = 10;
  const SAVE_URL = 'https://hook.eu1.make.com/s3qla42l3rlaonskbkmkfqs9aqp99axy';
  const LIST_URL = 'https://hook.eu1.make.com/hgy6628rpsxt97459vikaaftba8luv7r';
  const NAME_KEY = 'nasobka.name';

  const qEl = document.getElementById('question');
  const gridEl = document.getElementById('grid');
  const statusEl = document.getElementById('status');
  const qNumEl = document.getElementById('qNum');
  const correctEl = document.getElementById('correct');
  const timerEl = document.getElementById('timer');
  const summaryEl = document.getElementById('summary');
  const finalPointsEl = document.getElementById('finalPoints');
  const finalCorrectEl = document.getElementById('finalCorrect');
  const finalTimeEl = document.getElementById('finalTime');
  const playAgainBtn = document.getElementById('playAgain');

  const saveRow = document.getElementById('saveRow');
  const saveBtn = document.getElementById('saveBtn');
  const saveMsg = document.getElementById('saveMsg');
  const nameInput = document.getElementById('nameInput');
  const leaderboardEl = document.getElementById('leaderboard');
  const leaderboardListEl = document.getElementById('leaderboardList');

  let questionIndex = 0;
  let correctCount = 0;
  let currentAnswer = 0;
  let locked = false;
  let startTime = 0;
  let timerInterval = null;
  let lastPoints = 0;

  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function generateOptions(answer) {
    const options = new Set([answer]);
    while (options.size < 4) {
      const delta = rand(1, 8) * (Math.random() < 0.5 ? -1 : 1);
      const candidate = answer + delta;
      if (candidate > 0 && candidate <= 100) options.add(candidate);
    }
    return Array.from(options).sort(() => Math.random() - 0.5);
  }

  function elapsedSeconds() {
    return (Date.now() - startTime) / 1000;
  }

  function updateTimer() {
    timerEl.textContent = elapsedSeconds().toFixed(1);
  }

  function nextQuestion() {
    if (questionIndex >= TOTAL_QUESTIONS) {
      finish();
      return;
    }
    questionIndex++;
    qNumEl.textContent = questionIndex;
    locked = false;

    const a = rand(1, 10);
    const b = rand(1, 10);
    currentAnswer = a * b;
    qEl.textContent = `${a} × ${b}`;

    const options = generateOptions(currentAnswer);
    gridEl.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'answer';
      btn.textContent = opt;
      btn.addEventListener('click', () => handleAnswer(btn, opt));
      gridEl.appendChild(btn);
    });
  }

  function handleAnswer(btn, value) {
    if (locked) return;
    locked = true;
    const buttons = gridEl.querySelectorAll('.answer');
    buttons.forEach(b => b.disabled = true);

    if (value === currentAnswer) {
      btn.classList.add('correct');
      correctCount++;
      correctEl.textContent = correctCount;
      setTimeout(nextQuestion, 500);
    } else {
      btn.classList.add('wrong');
      buttons.forEach(b => {
        if (parseInt(b.textContent, 10) === currentAnswer) {
          b.classList.add('correct');
        }
      });
      setTimeout(nextQuestion, 1100);
    }
  }

  function computeScore(correct, totalSeconds) {
    // Base: 100 points per correct answer.
    // Time bonus: scaled so a fast perfect run (~30s for 10) gets a strong bonus,
    // a slow run (>120s) gets none. Bonus only applies to correct answers.
    const base = correct * 100;
    const idealPerQ = 3;            // seconds per question for max bonus
    const cutoffPerQ = 12;          // seconds per question past which bonus is 0
    const avg = totalSeconds / TOTAL_QUESTIONS;
    let speedFactor = (cutoffPerQ - avg) / (cutoffPerQ - idealPerQ);
    speedFactor = Math.max(0, Math.min(1, speedFactor));
    const bonus = Math.round(correct * 10 * speedFactor);
    return base + bonus;
  }

  function finish() {
    clearInterval(timerInterval);
    const totalTime = elapsedSeconds();
    const points = computeScore(correctCount, totalTime);
    lastPoints = points;

    statusEl.classList.add('hidden');
    qEl.classList.add('hidden');
    gridEl.classList.add('hidden');

    finalPointsEl.textContent = points;
    finalCorrectEl.textContent = `${correctCount}/${TOTAL_QUESTIONS}`;
    finalTimeEl.textContent = `${totalTime.toFixed(1)} s`;

    saveRow.classList.remove('hidden');
    leaderboardEl.classList.add('hidden');
    saveMsg.textContent = '';
    saveBtn.disabled = false;
    saveBtn.textContent = 'Uložiť';
    nameInput.value = localStorage.getItem(NAME_KEY) || '';

    summaryEl.classList.remove('hidden');
  }

  async function saveScore(name, score) {
    const url = `${SAVE_URL}?name=${encodeURIComponent(name)}&score=${score}`;
    const res = await fetch(url, { method: 'GET' });
    if (!res.ok) throw new Error('save failed: ' + res.status);
  }

  async function loadTop10() {
    const res = await fetch(LIST_URL);
    if (!res.ok) throw new Error('load failed: ' + res.status);
    const data = await res.json();
    return Array.isArray(data) ? data : [];
  }

  function renderLeaderboard(listEl, entries, highlightName, highlightScore) {
    const sorted = entries
      .filter(e => e && typeof e.name === 'string')
      .slice()
      .sort((a, b) => (b.score || 0) - (a.score || 0))
      .slice(0, 10);

    listEl.innerHTML = '';
    if (sorted.length === 0) {
      const li = document.createElement('li');
      li.className = 'empty';
      li.textContent = 'Zatiaľ žiadne skóre';
      listEl.appendChild(li);
      return;
    }

    let highlighted = false;
    sorted.forEach((e, i) => {
      const li = document.createElement('li');
      const isMe = !highlighted &&
        highlightName && e.name === highlightName &&
        Number(e.score) === Number(highlightScore);
      if (isMe) {
        li.classList.add('me');
        highlighted = true;
      }
      const rank = document.createElement('span');
      rank.className = 'rank';
      rank.textContent = (i + 1) + '.';
      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = e.name;
      const score = document.createElement('span');
      score.className = 'score';
      score.textContent = e.score;
      li.appendChild(rank);
      li.appendChild(name);
      li.appendChild(score);
      listEl.appendChild(li);
    });
  }

  async function handleSave() {
    const name = nameInput.value.trim();
    if (!name) {
      nameInput.focus();
      return;
    }
    saveBtn.disabled = true;
    saveBtn.textContent = 'Ukladám…';
    saveMsg.textContent = '';
    try {
      await saveScore(name, lastPoints);
      localStorage.setItem(NAME_KEY, name);
      const entries = await loadTop10();
      renderLeaderboard(leaderboardListEl, entries, name, lastPoints);
      saveRow.classList.add('hidden');
      leaderboardEl.classList.remove('hidden');
    } catch (err) {
      saveMsg.textContent = 'Nepodarilo sa uložiť. Skús znova.';
      saveBtn.disabled = false;
      saveBtn.textContent = 'Uložiť';
    }
  }

  saveBtn.addEventListener('click', handleSave);
  nameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSave();
  });

  function start() {
    questionIndex = 0;
    correctCount = 0;
    correctEl.textContent = '0';
    qNumEl.textContent = '1';

    document.getElementById('startScreen').classList.add('hidden');
    statusEl.classList.remove('hidden');
    qEl.classList.remove('hidden');
    gridEl.classList.remove('hidden');
    summaryEl.classList.add('hidden');

    startTime = Date.now();
    clearInterval(timerInterval);
    timerInterval = setInterval(updateTimer, 100);
    updateTimer();

    nextQuestion();
  }

  function showStartScreen() {
    clearInterval(timerInterval);
    statusEl.classList.add('hidden');
    qEl.classList.add('hidden');
    gridEl.classList.add('hidden');
    summaryEl.classList.add('hidden');
    document.getElementById('leaderboardScreen').classList.add('hidden');
    document.getElementById('startScreen').classList.remove('hidden');
  }

  async function openLeaderboardScreen() {
    document.getElementById('startScreen').classList.add('hidden');
    const screen = document.getElementById('leaderboardScreen');
    const list = document.getElementById('standaloneLeaderboardList');
    screen.classList.remove('hidden');

    list.innerHTML = '';
    const loading = document.createElement('li');
    loading.className = 'empty';
    loading.textContent = 'Načítavam…';
    list.appendChild(loading);

    try {
      const entries = await loadTop10();
      renderLeaderboard(list, entries);
    } catch (err) {
      list.innerHTML = '';
      const fail = document.createElement('li');
      fail.className = 'empty';
      fail.textContent = 'Nepodarilo sa načítať';
      list.appendChild(fail);
    }
  }

  playAgainBtn.addEventListener('click', start);
  document.getElementById('startBtn').addEventListener('click', start);
  document.getElementById('resetBtn').addEventListener('click', showStartScreen);
  document.getElementById('openLeaderboardBtn').addEventListener('click', openLeaderboardScreen);
  document.getElementById('backFromLeaderboardBtn').addEventListener('click', showStartScreen);
  showStartScreen();
</script>
</body>
</html>
