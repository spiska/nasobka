<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Generátor ikon</title>
<style>
  body {
    font-family: -apple-system, system-ui, sans-serif;
    max-width: 720px;
    margin: 0 auto;
    padding: 24px;
    background: #fafafa;
    color: #222;
  }
  h1 { margin-top: 0; }
  .row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    margin-bottom: 8px;
    background: #fff;
  }
  canvas {
    border: 1px solid #ddd;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .meta { flex: 1; }
  button {
    padding: 10px 18px;
    font-size: 1rem;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #a570ff;
    color: #fff;
    font-weight: 600;
  }
  button.all {
    margin-bottom: 16px;
    background: #2d1b4e;
    padding: 14px 24px;
    font-size: 1.1rem;
  }
  code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
<h1>Generátor ikon</h1>
<p>Klikni <strong>Stiahnuť všetky</strong>, ulož PNG súbory do tej istej zložky kde je <code>index.html</code>.</p>
<button class="all" id="downloadAll">Stiahnuť všetky</button>
<div id="list"></div>

<script>
const SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd6ec"/>
      <stop offset="0.5" stop-color="#d4b5ff"/>
      <stop offset="1" stop-color="#a5c8ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <g text-anchor="middle" dominant-baseline="central">
    <text x="128" y="268" font-size="170"
          font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, EmojiOne, sans-serif">❤️</text>
    <text x="256" y="252" font-size="130" font-weight="800" fill="#2d1b4e"
          font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">×</text>
    <text x="384" y="268" font-size="170"
          font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, EmojiOne, sans-serif">🧠</text>
  </g>
</svg>`;

// Maskable verzia má extra padding (safe zone ~80%) — obsah v strednom kruhu
const SVG_MASKABLE = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd6ec"/>
      <stop offset="0.5" stop-color="#d4b5ff"/>
      <stop offset="1" stop-color="#a5c8ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <g text-anchor="middle" dominant-baseline="central" transform="translate(256 256) scale(0.7) translate(-256 -256)">
    <text x="128" y="268" font-size="170"
          font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, EmojiOne, sans-serif">❤️</text>
    <text x="256" y="252" font-size="130" font-weight="800" fill="#2d1b4e"
          font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">×</text>
    <text x="384" y="268" font-size="170"
          font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, EmojiOne, sans-serif">🧠</text>
  </g>
</svg>`;

const targets = [
  { name: 'icon-192.png', size: 192, svg: SVG },
  { name: 'icon-512.png', size: 512, svg: SVG },
  { name: 'icon-180.png', size: 180, svg: SVG },
  { name: 'icon-maskable-512.png', size: 512, svg: SVG_MASKABLE }
];

function svgToCanvas(svgText, size) {
  return new Promise((resolve, reject) => {
    const blob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      URL.revokeObjectURL(url);
      resolve(canvas);
    };
    img.onerror = e => { URL.revokeObjectURL(url); reject(e); };
    img.src = url;
  });
}

function downloadCanvas(canvas, name) {
  return new Promise(resolve => {
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => { URL.revokeObjectURL(url); resolve(); }, 100);
    }, 'image/png');
  });
}

async function buildPreviews() {
  const list = document.getElementById('list');
  for (const t of targets) {
    const previewSize = Math.min(t.size, 128);
    const canvas = await svgToCanvas(t.svg, previewSize);
    canvas.style.width = previewSize + 'px';
    canvas.style.height = previewSize + 'px';

    const row = document.createElement('div');
    row.className = 'row';

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.innerHTML = `<strong>${t.name}</strong><br><small>${t.size}×${t.size}</small>`;

    const btn = document.createElement('button');
    btn.textContent = 'Stiahnuť';
    btn.onclick = async () => {
      const fullCanvas = await svgToCanvas(t.svg, t.size);
      await downloadCanvas(fullCanvas, t.name);
    };

    row.appendChild(canvas);
    row.appendChild(meta);
    row.appendChild(btn);
    list.appendChild(row);
  }
}

document.getElementById('downloadAll').onclick = async () => {
  for (const t of targets) {
    const canvas = await svgToCanvas(t.svg, t.size);
    await downloadCanvas(canvas, t.name);
    await new Promise(r => setTimeout(r, 250));
  }
};

buildPreviews();
</script>
</body>
</html>
